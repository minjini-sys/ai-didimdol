<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 디딤돌</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">AI 디딤돌</p>
        <h1>하고 싶은 일을 말하면, AI가 필요한 도구를 알아서 고릅니다.</h1>
        <p>Skill, MCP, Agent를 몰라도 괜찮습니다. 먼저 결과물을 보여주고, 아래에서 어떤 조합으로 처리했는지 확인할 수 있습니다.</p>
      </section>

      <section class="chat">
        <form id="routeForm" class="composer" aria-label="AI 디딤돌 입력">
          <textarea id="userInput" rows="3" placeholder="예: 작은 카페를 운영하는데 동네 손님에게 보낼 홍보 문구와 이번 주 실행 계획을 만들고 싶어."></textarea>
          <button type="submit" class="send-button" aria-label="보내기">
            <span aria-hidden="true">↑</span>
          </button>
        </form>

        <section id="answer" class="answer" aria-live="polite">
          <div id="resultBody" class="result-body">
            <p class="empty">원하는 일을 한 문장으로 적어보세요.</p>
          </div>
        </section>

        <details id="routerDetails" class="router-details">
          <summary>AI 라우터가 사용한 단계 보기</summary>
          <div id="routerTrace" class="trace-list"></div>
        </details>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
