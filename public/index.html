<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 디딤돌</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">AI 디딤돌</p>
        <h1>하고 싶은 일을 말하면 AI가 필요한 과정을 대신 잡아줍니다.</h1>
        <p>어려운 도구 이름을 몰라도 괜찮습니다. 필요한 정보는 AI가 하나씩 묻고, 도움 기능을 쓰기 전에는 먼저 이유를 설명하고 확인을 받습니다.</p>
      </section>

      <section class="chat">
        <form id="routeForm" class="composer" aria-label="AI 디딤돌 입력">
          <textarea id="userInput" rows="3" placeholder="예: AI로 회의 음성을 자동으로 받아쓰고 요약한 다음 Notion에 정리하는 도구 조합을 찾고 싶어."></textarea>
          <button type="submit" class="send-button" aria-label="보내기">
            <span aria-hidden="true">↑</span>
          </button>
        </form>

        <section id="answer" class="answer" aria-live="polite">
          <div id="resultBody" class="result-body">
            <p class="empty">원하는 일을 한 문장으로 적어보세요.</p>
          </div>
        </section>

        <details id="routerDetails" class="router-details">
          <summary>어떻게 만들었는지 보기</summary>
          <div id="routerTrace" class="trace-list"></div>
        </details>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
